<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFFFFF">
    <title>闲鱼文案助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --bg-page: #FAFAFA;
            --text-primary: #202124;
            --text-secondary: #5F6368;
            --accent: #1A73E8;
            --accent-hover: #1557B0;
            --success: #0F9D58;
            --border: #DADCE0;
            --shadow: rgba(0, 0, 0, 0.08);
            --shadow-focus: rgba(26, 115, 232, 0.24);
        }

        html {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-page);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-overflow-scrolling: touch;
        }

        ::-webkit-scrollbar {
            width: 0;
            height: 0;
            background: transparent;
        }

        .app-container {
            max-width: 420px;
            margin: 0 auto;
            background-color: var(--bg-primary);
            min-height: 100vh;
            position: relative;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }



        .navbar-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }

        .main-content {
            padding: 20px;
        }

        .card {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
        }

        .input-field {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            background-color: var(--bg-primary);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            color: var(--text-primary);
            transition: box-shadow 0.2s ease;
            font-family: inherit;
        }

        .input-field:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--shadow-focus);
        }

        .input-field::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .input-field-secondary {
            height: 40px;
            margin-bottom: 0;
        }

        .btn-primary {
            width: 100%;
            height: 48px;
            background-color: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary:disabled:hover {
            background-color: var(--accent);
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--bg-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .result-container {
            display: none;
        }

        .result-container.active {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card {
            background-color: var(--bg-primary);
            border-radius: 16px;
            box-shadow: 0 1px 3px var(--shadow);
            padding: 20px;
            overflow: hidden;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .result-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
        }

        .result-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .result-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .result-content {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .result-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .action-btn:hover {
            background-color: var(--bg-secondary);
        }

        .action-btn.copy-success {
            color: var(--success);
        }

        .action-btn:active {
            background-color: var(--border);
        }

        .action-icon {
            font-size: 18px;
        }

        .skeleton-container {
            display: none;
            padding: 20px;
        }

        .skeleton-container.active {
            display: block;
        }

        .skeleton-card {
            background-color: var(--bg-primary);
            border-radius: 16px;
            box-shadow: 0 1px 3px var(--shadow);
            padding: 20px;
        }

        .skeleton-line {
            height: 16px;
            background: linear-gradient(90deg, var(--bg-secondary) 25%, #E8EAED 50%, var(--bg-secondary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .skeleton-line.short {
            width: 60%;
        }

        .skeleton-line.medium {
            width: 80%;
        }

        .skeleton-line.long {
            width: 100%;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background-color: var(--text-primary);
            color: var(--bg-primary);
            padding: 14px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            max-width: calc(100% - 40px);
            text-align: center;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background-color: var(--success);
        }

        .empty-state {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state.active {
            display: block;
        }

        .empty-icon {
            font-size: 48px;
            color: var(--border);
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            color: var(--text-secondary);
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="navbar">
            <span class="navbar-title">闲鱼文案助手</span>
        </nav>

        <main class="main-content">
            <div class="card">
                <label class="input-label">输入商品主题</label>
                <input 
                    type="text" 
                    class="input-field" 
                    id="productInput"
                    placeholder="例如：全新未拆封的 AirPods Pro"
                >
                
                <label class="input-label" style="margin-top: 16px;">卖点补充（选填）</label>
                <input 
                    type="text" 
                    class="input-field input-field-secondary" 
                    id="productExtra"
                    placeholder="如：包邮、带发票、成色99新"
                >
            </div>

            <button class="btn-primary" id="generateBtn" onclick="generateCopy()">
                <span>生成</span>
            </button>

            <div class="skeleton-container" id="skeleton">
                <div class="skeleton-card">
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line long" style="height: 20px; margin-top: 16px;"></div>
                    <div class="skeleton-line long"></div>
                    <div class="skeleton-line medium"></div>
                    <div class="skeleton-line short"></div>
                </div>
            </div>

            <div class="empty-state" id="emptyState">
                <span class="material-symbols-outlined empty-icon">lightbulb</span>
                <div class="empty-title">还没有生成文案</div>
                <div class="empty-desc">输入商品信息，点击上方按钮开始生成</div>
            </div>

            <div class="result-container" id="resultContainer">
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-dot"></div>
                        <span class="result-label">生成文案</span>
                    </div>
                    <div class="result-title" id="resultTitle"></div>
                    <div class="result-content" id="resultContent"></div>
                    <div class="result-actions">
                        <button class="action-btn" id="copyBtn" onclick="copyResult()">
                            <span class="material-symbols-outlined action-icon">content_copy</span>
                            <span>复制文案</span>
                        </button>
                        <button class="action-btn" onclick="generateAgain()">
                            <span class="material-symbols-outlined action-icon">refresh</span>
                            <span>重新生成</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_URL = '/api/generate';
        
        const defaultTitle = '🎧 全新未拆封 AirPods Pro｜官网购入 质保期内';
        const defaultContent = '官网购入全新未拆封，带电子发票，2年质保还剩一半。音质完美、降噪强悍，因换了其他耳机故闲置出。爽快包邮顺丰，喜欢可直接拍下～';

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('emptyState').classList.add('active');
        });

        async function generateCopy() {
            const input = document.getElementById('productInput').value.trim();
            const extra = document.getElementById('productExtra').value.trim();
            const generateBtn = document.getElementById('generateBtn');
            const skeleton = document.getElementById('skeleton');
            const resultContainer = document.getElementById('resultContainer');
            const emptyState = document.getElementById('emptyState');
            const resultTitle = document.getElementById('resultTitle');
            const resultContent = document.getElementById('resultContent');

            if (!input) {
                showToast('请先输入商品主题哦~');
                return;
            }

            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="loading-spinner"></span>';
            
            skeleton.classList.add('active');
            resultContainer.classList.remove('active');
            emptyState.classList.remove('active');

            try {
                const text = extra ? `${input}，${extra}` : input;
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`请求失败 (${response.status}): ${errorText}`);
                }

                const data = await response.json();
                
                if (data.success && data.content) {
                    const content = data.content;
                    const lines = content.split('\n').filter(line => line.trim());
                    
                    if (lines.length >= 2) {
                        resultTitle.textContent = lines[0];
                        resultContent.textContent = lines.slice(1).join('\n');
                    } else if (lines.length === 1) {
                        resultTitle.textContent = lines[0];
                        resultContent.textContent = '';
                    } else {
                        throw new Error('文案内容为空');
                    }
                } else {
                    throw new Error(data.error || '未能获取到文案');
                }

            } catch (err) {
                console.error(err);
                resultTitle.textContent = defaultTitle;
                resultContent.textContent = defaultContent;
                showToast('生成失败，显示示例文案', false);
            } finally {
                skeleton.classList.remove('active');
                resultContainer.classList.add('active');
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<span>生成</span>';
            }
        }

        function copyResult() {
            const title = document.getElementById('resultTitle').textContent;
            const content = document.getElementById('resultContent').textContent;
            const copyBtn = document.getElementById('copyBtn');
            const textToCopy = content ? `${title}\n${content}` : title;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                copyBtn.classList.add('copy-success');
                copyBtn.innerHTML = '<span class="material-symbols-outlined action-icon">check</span><span>已复制 ✓</span>';
                
                showToast('复制成功', true);
                
                setTimeout(() => {
                    copyBtn.classList.remove('copy-success');
                    copyBtn.innerHTML = '<span class="material-symbols-outlined action-icon">content_copy</span><span>复制文案</span>';
                }, 2000);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = textToCopy;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                
                copyBtn.classList.add('copy-success');
                copyBtn.innerHTML = '<span class="material-symbols-outlined action-icon">check</span><span>已复制 ✓</span>';
                
                showToast('复制成功', true);
                
                setTimeout(() => {
                    copyBtn.classList.remove('copy-success');
                    copyBtn.innerHTML = '<span class="material-symbols-outlined action-icon">content_copy</span><span>复制文案</span>';
                }, 2000);
            });
        }

        function generateAgain() {
            const resultContainer = document.getElementById('resultContainer');
            const emptyState = document.getElementById('emptyState');
            
            resultContainer.classList.remove('active');
            emptyState.classList.add('active');
        }

        function showToast(message, isSuccess = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast${isSuccess ? ' success' : ''}`;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        document.getElementById('productInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                generateCopy();
            }
        });
    </script>
</body>
</html>
